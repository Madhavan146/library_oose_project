}
.butt{
    margin-left: 230px;

}



.con{

}
.container{

   background-size: cover;
   background-repeat: no-repeat;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    border: 1px solid;
    border-radius: 18px;


     position: relative;
overflow: hidden;


}

.panell *{
    position: relative;
    z-index: 1;
}

.panell::before{
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;

    background: inherit;
    filter: blur(4px);
    transform: scale(1.02);

    z-index: 0;
}
