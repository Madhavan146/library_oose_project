  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management System - Sign Up</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      background: url('https://a.storyblok.com/f/286279/1208x432/e705cad7e3/og_image.jpg') center/cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .signup-container {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .signup-container h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    .input-group input:focus {
      outline: none;
      border-color: #4a90e2;
      background: rgba(255, 255, 255, 0.2);
    }
    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.8);
    }
    .login-link a {
      color: #4a90e2;
      text-decoration: none;
      font-weight: bold;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
    .error-message {
      color: #ff6b6b;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
    .success-message {
      color: #51cf66;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
    .password-strength {
      height: 4px;
      margin-top: 5px;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .strength-weak { background: #ff6b6b; width: 33%; }
    .strength-medium { background: #ffd43b; width: 66%; }
    .strength-strong { background: #51cf66; width: 100%; }
  </style>
</head>
<body>
  <div class="signup-container">
    <h1>📝 Sign Up</h1>
    <div class="input-group">
      <input type="text" id="username" placeholder="Username">
    </div>
    <div class="input-group">
      <input type="email" id="email" placeholder="Email">
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="Password">
      <div id="strengthBar" class="password-strength"></div>
    </div>
    <div class="input-group">
      <input type="password" id="confirmPassword" placeholder="Confirm Password">
    </div>
    <button onclick="handleSignup()">Create Account</button>
    <div class="login-link">
      Already have an account? <a href="index.html">Login</a>
    </div>
    <div id="errorMsg" class="error-message"></div>
    <div id="successMsg" class="success-message"></div>
  </div>

  <script>
    // Password strength checker
    document.getElementById('password').addEventListener('input', function() {
      const password = this.value;
      const strengthBar = document.getElementById('strengthBar');
      
      let strength = 0;
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;
      
      strengthBar.className = 'password-strength';
      if (strength <= 2) strengthBar.classList.add('strength-weak');
      else if (strength <= 4) strengthBar.classList.add('strength-medium');
      else strengthBar.classList.add('strength-strong');
    });

    function handleSignup() {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");

      errorMsg.textContent = "";
      successMsg.textContent = "";

      // Validation
      if (!username) {
        errorMsg.textContent = "Please enter a username";
        return;
      }
      if (!email) {
        errorMsg.textContent = "Please enter an email";
        return;
      }
      if (!email.includes('@') || !email.includes('.')) {
        errorMsg.textContent = "Please enter a valid email address";
        return;
      }
      if (!password) {
        errorMsg.textContent = "Please enter a password";
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent = "Password must be at least 6 characters";
        return;
      }
      if (password !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match";
        return;
      }

      // Check if user already exists
      let users = JSON.parse(localStorage.getItem("users") || "[]");
      if (users.find(u => u.username === username)) {
        errorMsg.textContent = "Username already exists. Please choose another.";
        return;
      }
      if (users.find(u => u.email === email)) {
        errorMsg.textContent = "Email already registered. Please login.";
        return;
      }

      // Save new user
      users.push({ username, email, password, joinDate: new Date().toISOString() });
      localStorage.setItem("users", JSON.stringify(users));

      successMsg.textContent = "Account created successfully! Redirecting to login...";
      
      setTimeout(() => {
        window.location.href = "index.html";
      }, 2000);
    }
  </script>
</body>
</html>
